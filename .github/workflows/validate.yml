name: Validate

# HA-recommended validation for a HACS custom integration: hassfest (manifest +
# integration schema) and the HACS action (repository structure / hacs.json / brands).
# Runs on every push + PR, and daily so upstream hassfest/HACS changes surface early.
on:
  push:
    branches: [main]
  pull_request:
  schedule:
    - cron: "0 4 * * *"
  workflow_dispatch:

jobs:
  blueprints:
    name: blueprints in sync
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # Blueprints are bundled inside the package (custom_components/.../blueprints/) so
      # they ship in the HACS zip and auto-install. The canonical copies at the repo root
      # are what humans edit. Fail if any drift -- resync by copying the root copy over the
      # bundled one, e.g.:
      #   cp blueprints/automation/vmyronovych/<name>.yaml \
      #      custom_components/waveshare_relay/blueprints/automation/vmyronovych/<name>.yaml
      - name: Canonical and bundled blueprint copies must match
        run: |
          diff -ru \
            blueprints/automation/vmyronovych \
            custom_components/waveshare_relay/blueprints/automation/vmyronovych

  hassfest:
    name: hassfest
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: home-assistant/actions/hassfest@master

  hacs:
    name: HACS
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: hacs/action@main
        with:
          category: integration
