name: Validate

# HA-recommended validation for a HACS custom integration: hassfest (manifest +
# integration schema) and the HACS action (repository structure / hacs.json / brands).
# Runs on every push + PR, and daily so upstream hassfest/HACS changes surface early.
on:
  push:
    branches: [main]
  pull_request:
  schedule:
    - cron: "0 4 * * *"
  workflow_dispatch:

jobs:
  blueprints:
    name: blueprints in sync
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # The blueprint is bundled inside the package (custom_components/.../blueprints/) so
      # it ships in the HACS zip and auto-installs. The canonical copy at the repo root is
      # what humans edit. Fail if they drift -- resync with:
      #   cp blueprints/automation/waveshare_relay/oselia_button_to_relay.yaml \
      #      custom_components/waveshare_relay/blueprints/automation/waveshare_relay/oselia_button_to_relay.yaml
      - name: Canonical and bundled blueprint copies must match
        run: |
          diff -u \
            blueprints/automation/waveshare_relay/oselia_button_to_relay.yaml \
            custom_components/waveshare_relay/blueprints/automation/waveshare_relay/oselia_button_to_relay.yaml

  hassfest:
    name: hassfest
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: home-assistant/actions/hassfest@master

  hacs:
    name: HACS
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: hacs/action@main
        with:
          category: integration
